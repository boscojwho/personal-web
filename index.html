      title: "On the patience required to design well",
      date:  "Mar 2026",
      body: `## The problem with speed

Everyone is in a hurry. Deadlines compress, stakeholders push, and the culture of shipping fast has become so normalized that slowness feels like a moral failing.

But good design doesn't emerge from speed. It emerges from iteration, reflection, and the willingness to throw away something almost-right in search of something better.

## What patience actually looks like

Patience in design is not passive. It's not waiting around. It's the active practice of sitting with a problem long enough to understand it properly before reaching for solutions.

It means resisting the first idea. The first idea is almost always a reflex — a pattern you've seen before, applied to a new surface. It feels right because it's familiar. It rarely is.

## The cost of impatience

Impatient design is everywhere. You can feel it in products that almost work — where the interactions are slightly off, where the copy doesn't quite match the context, where the visual hierarchy tells you one thing and the behavior tells you another.

These aren't failures of skill. They're failures of time. The designer knew, on some level, that something was wrong. They shipped anyway.

## A practice, not a talent

Patience can be cultivated. It starts with giving yourself permission to not know yet — to hold the problem open a little longer, to make one more prototype, to ask one more question.

The best designers I've worked with aren't the fastest. They're the most comfortable with uncertainty.`

Each time I rebuild, I pick one constraint to obey and one assumption to test. The constraint forces me out of my defaults. The assumption forces me to defend a choice.

This time it was "no images" and "text-first as a feature, not a fallback." Both have changed how I think about layout in client work.

When you're building alone, every decision lands on you. There's no one to sanity-check the interaction model, no designer to push back on a bad layout, no PM to question a feature that seemed important at 2am.

It's not the hard parts. The hard parts — the architecture, the sync engine, the edge cases — those get solved eventually. You grind through them.

Long projects drift. Not all at once — a small compromise here, a deferred decision there, and six weeks later the thing in front of you only resembles the thing you set out to build.

I keep three anchors visible at my desk during any project that runs longer than a month: a one-line description of who it's for, a list of three things it does not do, and the rough shape of the first version. Whenever a decision feels heavy, I check it against these.

Most designers learn about whitespace early. It shows up in every design principles list. And yet it remains one of the most consistently misapplied concepts in interface design.

## What space actually does

Space creates grouping. Elements that are close together are perceived as related; elements that are far apart are perceived as distinct.

Space creates hierarchy. A heading with generous space above it signals a new section.

Space creates breathing room. Dense interfaces feel anxious. Airy interfaces feel calm.

## A simple heuristic

When something feels cluttered, the answer is rarely to remove elements. It's to increase the space between them. Start by doubling your margins. See what happens.`

A design with too many ideas asks too much of the viewer. Each element competes for attention with every other element. Cutting half your ideas doesn't lose half the value — it concentrates the remaining half until each one carries its weight.

      title: "Notes on using type as the primary design element",
      date:  "Jan 2025",
      body: `## An experiment

Last year I redesigned my portfolio with a single constraint: no images, no icons, no decorative elements of any kind. Only type, spacing, and color.

I expected to feel limited. Instead, I felt free. Removing the crutches forced me to make the typography work harder — and in doing so, I learned more about type in three weeks than in the previous three years.

## What type can carry

Typography is capable of far more than most interfaces ask of it. Size creates hierarchy. Weight creates emphasis. Letter-spacing creates register — tight for display, open for labels. Line-height controls density and pace.

A well-set paragraph is a designed object. Most interfaces treat it as a container for content rather than content itself. The text is something to be "filled in" after the real design decisions are made. This is exactly backwards.

## The variables that matter most

**Size ratio.** The contrast between your largest and smallest type determines how much visual drama the page has. Most interfaces are too compressed — everything sits within a 12–18px range and nothing stands out.

**Weight.** A single weight can work, but the jump from light (300) to medium (500) is often more interesting than bold. Bold is a hammer — effective, but blunt.

**Spacing.** Generous line-height (1.7–1.9 for body text) makes prose readable and gives the page air. Tight line-height (1.1–1.2) makes display text feel intentional and compressed.

**Tracking.** Letter-spacing on uppercase labels (0.08–0.15em) signals metadata, navigation, supporting information.

## On choosing typefaces

A typeface is not decoration. It carries tone before a single word is read. A grotesque sans feels different from a humanist sans feels different from a geometric sans.

The mistake most designers make is optimizing for novelty. An unusual typeface feels like a design decision, so it reads as intentional. But novelty fades. What lasts is how the type behaves at 14px in a dense paragraph at 11pm on a tired reader's phone.

## Rhythm and pace

Reading is temporal. A page of text is not experienced all at once — it's experienced in time, sentence by sentence, paragraph by paragraph. Good typography controls that pace.

Short paragraphs create speed. Long paragraphs slow the reader down. Section headers are rest stops.

## What gets removed

When type is doing everything, you start to notice how many design elements exist to compensate for weak typography.

Borders that separate things type-hierarchy could separate. Colors that signal importance that weight could signal. Icons that label things the words themselves could label.

## The result

The portfolio I built under this constraint is the one you're reading now. It's the design I've received the most comments on, and almost all of them have been about how it feels to read.

That's the point. Type is not the absence of design. It's design in its most direct form — meaning, made visible.

## What to try

If you want to test this yourself, pick a page in your current project and remove everything that isn't text. Then ask: is the hierarchy still clear? Can you tell what's important? Does the page have rhythm?

If the answer is no, you don't have a visual design problem. You have a typography problem. Fix that first.`
    },
    {
      title: "Why constraints make better designers",
      date:  "Sep 2024",
      body: `## The myth of total freedom

A blank canvas is rarely a gift. Most designers do their best work when something has been taken away — a budget, a timeline, a palette, a single constraint imposed on the rest.

## What constraints really do

They don't limit creativity. They focus it. A tight constraint forces you to look harder at what you have rather than wishing for what you don't.

## A small habit

Before starting any new project, I write down two constraints I'll respect for the duration. Sometimes they're technical, sometimes formal, sometimes purely about taste. They become the thing I lean on when the work gets hard.`
    },
    {
      title: "Designing for boring tasks",
      date:  "Jun 2024",
      body: `## The unglamorous middle

Most software people use every day handles boring tasks: filing receipts, scheduling appointments, tracking inventory. The design discourse rarely talks about them. That's a mistake.

## Where the real wins are

Tools for boring tasks have a strict honesty test. Either they save time or they don't. There's no aesthetic justification that survives the user's actual stopwatch.

## What it teaches

Designing for boring tasks teaches you to value clarity over delight, throughput over polish. Those skills make you better at the more glamorous work, too.`
    },
    {
      title: "On staying small as a studio",
      date:  "Mar 2024",
      body: `## Growth isn't a virtue

There's a quiet assumption in studio life that bigger is better. More clients, more billables, more headcount. I've come to think the opposite is closer to true for most of us.

## What small earns you

A small studio can say no. It can take fewer projects, do them more carefully, and keep the people involved closer to the work. The economics are simpler. The decisions are quicker. The quality of the work has fewer hands diluting it.

## The cost

Small means less leverage and fewer big swings. That's a real trade. But for the kind of work I want to do, it's a trade I'd make again every time.`
    },
  ],
};

function ArticleDetail({ article, onBack, theme, onTheme }) {
  const [activeId, setActiveId] = useState(null);
  const contentRef = useRef(null);

  const headings = useMemo(() => {
    return [...article.body.matchAll(/^## (.+)$/gm)].map(m => ({
      text: m[1],
      id: 'h-' + m[1].toLowerCase().replace(/[^a-z0-9]+/g, '-'),
    }));
  }, [article]);

  const [tocOpen, setTocOpen] = useState(false);

  const html = useMemo(() => {
    let md = article.body;
    headings.forEach(h => {
      md = md.replace(
        new RegExp(`^## ${h.text.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}$`, 'm'),
        `## <span id="${h.id}">${h.text}</span>`
      );
    });
    return marked.parse(md);
  }, [article, headings]);

  useEffect(() => {
    if (!contentRef.current) return;
    const els = headings.map(h => document.getElementById(h.id)).filter(Boolean);
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) setActiveId(e.target.id); });
    }, { rootMargin: '-10% 0px -80% 0px' });
    els.forEach(el => obs.observe(el));
    return () => obs.disconnect();
  }, [headings]);

  return (
    <div style={{ animation: 'fadeUp 0.2s ease', padding: '40px var(--gap)' }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 14, marginBottom: '32px' }}>
        <button onClick={onBack} style={{
          background: 'none', border: 'none', cursor: 'pointer',
          font: 'inherit', color: 'var(--mid)', padding: 0,
          display: 'block',
          textDecoration: 'underline',
        }}>← All writing</button>
        <CompactThemeToggle theme={theme} onTheme={onTheme} />
      </div>

      <div className="article-grid" style={{
        display: 'grid',
        gridTemplateColumns: headings.length ? 'minmax(0,1fr) 180px' : '1fr',
        gap: '60px',
        maxWidth: '760px',
        alignItems: 'start',
      }}>
        <div>
          <p style={{ fontWeight: 600, marginBottom: '4px' }}>{article.title}</p>
          <p style={{ color: 'var(--mid)', marginBottom: '28px' }}>{article.date}</p>
          <div ref={contentRef} className="ab" dangerouslySetInnerHTML={{ __html: html }} />
        </div>

        {headings.length > 0 && (
          <nav className="toc-sidebar" style={{ position: 'sticky', top: '40px' }}>
            <p style={{ fontWeight: 600, marginBottom: '8px' }}>Contents</p>
            {headings.map(h => (
              <a key={h.id} href={'#' + h.id}
                className={'toc-link' + (activeId === h.id ? ' on' : '')}>
                {h.text}
              </a>
            ))}
          </nav>
        )}
      </div>

      {headings.length > 0 && (
        <button
          className="toc-fab"
          onClick={() => setTocOpen(o => !o)}
          aria-label={tocOpen ? "Close table of contents" : "Open table of contents"}
          aria-expanded={tocOpen}
        >
          {tocOpen ? (
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
          ) : (
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M4 6h16M4 12h16M4 18h10"/></svg>
          )}
        </button>
      )}

      {tocOpen && (
        <div className="toc-overlay" onClick={() => setTocOpen(false)}>
          <div className="toc-sheet" onClick={e => e.stopPropagation()}>
            <p style={{ fontWeight: 600, marginBottom: '12px' }}>Contents</p>
            {headings.map(h => (
              <a key={h.id} href={'#' + h.id}
                onClick={() => setTocOpen(false)}
                className={'toc-link' + (activeId === h.id ? ' on' : '')}
                style={{ fontSize: '15px', padding: '10px 8px' }}>
                {h.text}
              </a>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function CompactThemeToggle({ theme, onTheme, alwaysVisible = false }) {
  const order = ['light', 'system', 'dark'];
  const items = {
    light: { title: 'Light', icon: (
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
    )},
    system: { title: 'System', icon: (
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="4" width="20" height="14" rx="2"/><path d="M8 22h8M12 18v4"/></svg>
    )},
    dark: { title: 'Dark', icon: (
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    )},
  };
  const cur = items[theme] || items.system;
  const cycle = () => {
    const next = order[(order.indexOf(theme) + 1) % order.length];
    onTheme(next);
  };

  return (
    <div className={alwaysVisible ? 'compact-theme-wrap' : 'compact-theme-wrap compact-only'}
         style={alwaysVisible ? undefined : { display: 'none' }}>
      <button onClick={cycle}
        title={`Appearance: ${cur.title}`}
        aria-label={`Appearance: ${cur.title}. Tap to switch.`}
        style={{
          background: 'none',
          border: 'none',
          padding: 6,
          margin: -6,
          cursor: 'pointer',
          color: 'var(--fg)',
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'center',
          font: 'inherit',
          borderRadius: 4,
          transition: 'color 0.1s',
        }}
        onMouseEnter={e => e.currentTarget.style.color = 'var(--mid)'}
        onMouseLeave={e => e.currentTarget.style.color = 'var(--fg)'}
      >{cur.icon}</button>
    </div>
  );
}

            const variants = app.variants && app.variants.length > 0 ? app.variants : [{ bg: app.bg, label: app.label }];
            // Per-variant tilts so they read as tiles in 3D space
            const tilts = [
              { rx: -6,  ry: -22, rz: -4 },
              { rx:  4,  ry: -8,  rz:  2 },
              { rx: -3,  ry:  16, rz: -2 },
              { rx:  8,  ry:  26, rz:  6 },

              <div style={{

                alignItems: 'center',
                flexShrink: 0,
                paddingLeft: variants.length > 1 ? '6px' : 0,
              }}>
                {variants.map((v, i) => {
                  const t = tilts[i % tilts.length];
                  const isHover = hoverV === i;
                  const baseLeft = i === 0 ? 0 : -22;
                  return (
                    <div key={i}
                      onMouseEnter={() => setHoverV(i)}
                      onMouseLeave={() => setHoverV(null)}
                      style={{
                      width: 72, height: 72,
                      background: v.bg,
                      borderRadius: 16,
                      display: 'flex', alignItems: 'center', justifyContent: 'center',
                      color: '#fff', fontSize: 32, fontWeight: 600,
                      marginLeft: isHover ? (i === 0 ? 8 : -6) : baseLeft,
                      marginRight: isHover && i < variants.length - 1 ? 16 : 0,
                      transform: isHover
                        ? `rotateX(0deg) rotateY(0deg) rotateZ(0deg) scale(1.18) translateY(-6px)`
                        : `rotateX(${t.rx}deg) rotateY(${t.ry}deg) rotateZ(${t.rz}deg)`,
                      transformStyle: 'preserve-3d',
                      border: variants.length > 1 ? '2px solid var(--bg)' : 'none',
                      boxShadow: isHover
                        ? '0 16px 30px rgba(0,0,0,0.28), 0 4px 8px rgba(0,0,0,0.18)'
                        : '0 10px 22px rgba(0,0,0,0.20), 0 2px 5px rgba(0,0,0,0.12)',
                      zIndex: isHover ? 50 : variants.length - i,
                      cursor: variants.length > 1 ? 'pointer' : 'default',
                      transition: 'transform 0.20s cubic-bezier(0.34, 1.4, 0.64, 1), margin 0.20s ease, box-shadow 0.20s ease',
                    }}>{v.label}</div>
                  );
                })}
              </div>
            );
          })()}
          <div style={{ paddingTop: '8px' }}>
            <p style={{ fontWeight: 600, fontSize: '1.1em', marginBottom: '4px' }}>{app.name}</p>
            <p style={{ color: 'var(--mid)', marginBottom: '2px' }}>{app.year}  ·  {app.tags}</p>
          </div>
        </div>

        {/* Tagline */}
        <p style={{ marginBottom: '28px', fontSize: '1.05em' }}>{app.desc}</p>

        {/* Body */}
        <div className="ab">
          {app.body.map((blk, i) => (
            blk.kind === 'h'
              ? <h2 key={i} style={{ fontWeight: 600, fontSize: '1em', marginTop: '24px', marginBottom: '8px' }}>{blk.text}</h2>
              : <p key={i} style={{ marginBottom: '14px' }}>{blk.text}</p>
          ))}
        </div>

        {/* Links */}
        {app.links && app.links.length > 0 && (
          <div style={{ marginTop: '32px', paddingTop: '20px', borderTop: '1px solid var(--rule)' }}>
            <p style={{ fontWeight: 600, marginBottom: '8px' }}>Links</p>

                </a>
              ))}
            </div>
          ));
        })()}
        {DATA.articles.length > 10 && (
          <a href="#" onClick={e => { e.preventDefault(); onAllArticles(); }}
            className="nav-link">
            <span className="nav-link-title">View all {DATA.articles.length} articles →</span>
          </a>
        )}
      </div>

      {/* Col 3: About */}
      <div style={{ paddingRight: '40px', marginBottom: '32px' }}>
        <p style={{ fontWeight: 600, marginBottom: '10px' }}>About</p>
        <p style={{ color: 'var(--mid)', marginBottom: '12px', maxWidth: '220px' }}>
          Designer &amp; developer. Previously at Figma, Linear, and a handful of early-stage startups.
        </p>
        <p style={{ color: 'var(--mid)', maxWidth: '220px' }}>
          Long walks, cold coffee, notebooks I rarely finish.
        </p>
      </div>

      {/* Col 4: Contact */}
      <div style={{ marginBottom: '32px' }}>
        <p style={{ fontWeight: 600, marginBottom: '10px' }}>Contact</p>
        <p style={{ color: 'var(--mid)', marginBottom: '12px' }}>{DATA.location}</p>
        {DATA.links.map((l, i) => (
          <a key={i} href={l.url} className="nav-link" style={{ marginBottom: '2px' }}>
            <span className="nav-link-title">{l.label}</span>
          </a>
        ))}
        <div className="theme-picker-inline" style={{ marginTop: '20px' }}>
          <CompactThemeToggle theme={theme} onTheme={onTheme} alwaysVisible />
        </div>
      </div>

      </div>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────

function App() {
  const [article, setArticle] = useState(null);
  const [app, setApp] = useState(null);
  const [allApps, setAllApps] = useState(false);
  const [allArticles, setAllArticles] = useState(false);
  const [theme, setTheme] = useState(TWEAK_DEFAULTS.theme || 'system');
  const [font, setFont] = useState(TWEAK_DEFAULTS.font || 'DM Sans');
  const [tweaksVisible, setTweaksVisible] = useState(false);

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
  }, [theme]);

  useEffect(() => {
    const opt = FONT_OPTIONS.find(o => o.label === font) || FONT_OPTIONS[0];
    document.body.style.fontFamily = opt.stack;
  }, [font]);

  const persist = (next) => {
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
  };

  useEffect(() => {
    const handler = e => {
      if (e.data?.type === '__activate_edit_mode') setTweaksVisible(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const openArticle = i => { setArticle(i); window.scrollTo(0, 0); };
  const closeArticle = () => { setArticle(null); window.scrollTo(0, 0); };
  const openApp = i => { setApp(i); window.scrollTo(0, 0); };
  const closeApp = () => { setApp(null); window.scrollTo(0, 0); };
  const openAllApps = () => { setAllApps(true); window.scrollTo(0, 0); };
  const closeAllApps = () => { setAllApps(false); window.scrollTo(0, 0); };
  const openAllArticles = () => { setAllArticles(true); window.scrollTo(0, 0); };
  const closeAllArticles = () => { setAllArticles(false); window.scrollTo(0, 0); };
  const openAppFromAll = i => { setAllApps(false); setApp(i); window.scrollTo(0, 0); };
  const openArticleFromAll = i => { setAllArticles(false); setArticle(i); window.scrollTo(0, 0); };

  const setThemeP = t => { setTheme(t); persist({ theme: t, font }); };
  const setFontP  = f => { setFont(f);  persist({ theme, font: f }); };

  return (
    <>
      {article !== null
        ? <ArticleDetail article={DATA.articles[article]} onBack={closeArticle} theme={theme} onTheme={setThemeP} />
        : app !== null
          ? <AppDetail app={DATA.apps[app]} onBack={closeApp} theme={theme} onTheme={setThemeP} />
          : allApps
            ? <AllApps onBack={closeAllApps} onApp={openAppFromAll} theme={theme} onTheme={setThemeP} />
            : allArticles
              ? <AllArticles onBack={closeAllArticles} onArticle={openArticleFromAll} theme={theme} onTheme={setThemeP} />
              : <MainGrid onArticle={openArticle} onApp={openApp} onAllApps={openAllApps} onAllArticles={openAllArticles} theme={theme} onTheme={setThemeP} font={font} onFont={setFontP} />}
      {tweaksVisible && <TweaksPanel theme={theme} onTheme={setThemeP} font={font} onFont={setFontP} />}
    </>
  );
}

function TweaksPanel({ theme, onTheme, font, onFont }) {
  return (
    <div style={{
      position: 'fixed', bottom: 24, right: 24, zIndex: 9999,
      background: 'var(--bg)', border: '1px solid var(--mid)',
      padding: 20, width: 220, fontSize: 13,
    }}>
      <p style={{ fontWeight: 600, marginBottom: 12 }}>Tweaks</p>

      <p style={{ color: 'var(--mid)', marginBottom: 6 }}>Theme</p>
      <div style={{ display: 'flex', gap: 4, marginBottom: 16 }}>
        {['light','dark','system'].map(t => (
          <button key={t} onClick={() => onTheme(t)} style={{
            flex: 1, padding: '4px 0',
            background: theme === t ? 'var(--fg)' : 'transparent',
            color: theme === t ? 'var(--bg)' : 'var(--fg)',
            border: '1px solid var(--mid)', cursor: 'pointer',
            font: 'inherit', textTransform: 'capitalize',
          }}>{t}</button>
        ))}
      </div>

      <p style={{ color: 'var(--mid)', marginBottom: 6 }}>Font</p>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
        {FONT_OPTIONS.map(o => (
          <button key={o.label} onClick={() => onFont(o.label)} style={{
            textAlign: 'left', padding: '6px 8px',
            background: font === o.label ? 'var(--fg)' : 'transparent',
            color: font === o.label ? 'var(--bg)' : 'var(--fg)',
            border: 'none', cursor: 'pointer',
            fontFamily: o.stack, fontSize: 13,
          }}>{o.label}</button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
