<!DOCTYPE html>
<html lang="en" data-theme="system">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bosco Ho</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500;600&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Plus+Jakarta+Sans:wght@700;800;900&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/marked@9.1.6/marked.min.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:  #ffffff;
      --fg:  #111111;
      --mid: #555555;
      --f:   15px;
      --lh:  1.48;
      --gap: 48px;
      --ul:  color-mix(in srgb, var(--fg) 32%, transparent);
    }

    @media (max-width: 640px) {
      :root { --gap: 24px; }
    }

    /* Force vertical stack on narrow viewports */
    @media (max-width: 700px) {
      .main-grid { grid-template-columns: 1fr !important; }
      .main-grid > div { padding-right: 0 !important; }
      .main-grid > div,
      .article-grid > div { min-width: 0; }
      .compact-only { display: flex !important; }
      .theme-picker-inline { display: none !important; }
    }

    /* Article TOC: sidebar on desktop, overlay on mobile */
    .toc-fab { display: none; }
    @media (max-width: 700px) {
      .article-grid { grid-template-columns: 1fr !important; gap: 0 !important; }
      .toc-sidebar { display: none !important; }
      .toc-fab { display: flex !important; }
    }

    @media (max-width: 420px) {
      :root { --gap: 18px; }
      .detail-topbar { flex-wrap: wrap; align-items: flex-start !important; }
      .site-header { flex-wrap: nowrap !important; align-items: flex-start !important; gap: 10px !important; }
      .site-header-brand {
        flex-wrap: nowrap !important;
        align-items: flex-start !important;
        gap: 10px !important;
        min-width: 0;
      }
      .site-icons {
        width: 132px !important;
        display: flex !important;
        flex-wrap: wrap;
        align-items: flex-start;
        align-content: start;
        gap: 0 !important;
      }
      .site-icons > button {
        width: 28px !important;
        height: 28px !important;
        margin-left: -4px !important;
        margin-right: 0 !important;
      }
      .site-icons > button:first-child {
        margin-left: 0 !important;
      }
      .site-icons > button:nth-child(n+6) {
        margin-top: -6px !important;
        margin-left: 5px !important;
      }
      .site-icons > button img {
        width: 28px !important;
        height: 28px !important;
      }
      .main-grid > div {
        padding-right: 0 !important;
      }
      .nav-link,
      .app-row {
        width: 100%;
        max-width: 100%;
      }
      .nav-link-title,
      .app-row span {
        overflow-wrap: anywhere;
      }
      .article-grid {
        gap: 24px !important;
      }
      .toc-fab {
        right: 16px;
        bottom: 16px;
      }
      .toc-sheet {
        padding-left: 20px;
        padding-right: 20px;
      }
      .ab pre {
        overflow-x: visible;
      }
      .ab pre code {
        min-width: 0;
        white-space: pre-wrap;
        word-break: break-word;
      }
    }

    @media (max-width: 360px) {
      :root { --gap: 14px; }
      .detail-topbar,
      .site-header {
        gap: 8px !important;
      }
      .site-header-brand {
        gap: 8px !important;
      }
      .site-icons {
        width: 114px !important;
        display: flex !important;
        flex-wrap: wrap;
        align-items: flex-start;
        align-content: flex-start;
        gap: 0 !important;
      }
      .site-icons > button {
        width: 26px !important;
        height: 26px !important;
        margin-left: -4px !important;
        margin-right: 0 !important;
      }
      .site-icons > button:first-child {
        margin-left: 0 !important;
      }
      .site-icons > button:nth-child(n+6) {
        margin-top: -6px !important;
        margin-left: 5px !important;
      }
      .site-icons > button img {
        width: 26px !important;
        height: 26px !important;
      }
      .nav-link,
      .app-row {
        padding-left: 6px;
        padding-right: 6px;
      }
      .article-grid,
      .main-grid > div {
        gap: 18px !important;
        padding-right: 0 !important;
      }
      .ab {
        font-size: 13px;
      }
      .ab a {
        overflow-wrap: anywhere;
        word-break: break-word;
      }
      .ab pre {
        overflow-x: visible;
      }
      .ab pre code {
        min-width: 0;
        white-space: pre-wrap;
        word-break: break-all;
      }
    }

    .toc-fab {
      position: fixed;
      bottom: 24px; right: 24px;
      width: 48px; height: 48px;
      border-radius: 50%;
      background: var(--fg);
      color: var(--bg);
      border: none;
      cursor: pointer;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(0,0,0,0.18);
      z-index: 250;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .toc-fab:hover, .toc-fab:focus-visible {
      transform: scale(1.06);
      box-shadow: 0 6px 22px rgba(0,0,0,0.25);
      outline: none;
    }
    .toc-fab:active { transform: scale(0.96); }

    .toc-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.3);
      z-index: 200;
      animation: fadeIn 0.15s ease;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }
    .toc-sheet {
      background: var(--bg);
      padding: 20px 24px calc(env(safe-area-inset-bottom, 0px) + 88px);
      border-top-left-radius: 16px;
      border-top-right-radius: 16px;
      max-height: 70vh;
      overflow-y: auto;
      animation: slideUp 0.2s ease;
      box-shadow: 0 -8px 30px rgba(0,0,0,0.18);
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to   { transform: none; opacity: 1; }
    }

    :root[data-theme="dark"] {
      --bg: #111111;
      --fg: #e8e8e8;
      --mid: #888888;
    }

    @media (prefers-color-scheme: dark) {
      :root[data-theme="system"] {
        --bg: #111111;
        --fg: #e8e8e8;
        --mid: #888888;
      }
    }

    html, body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'DM Sans', Helvetica, Arial, sans-serif;
      font-size: var(--f);
      line-height: var(--lh);
      font-weight: 500;
      -webkit-font-smoothing: antialiased;
      min-height: 100dvh;
      overflow-x: hidden;
      transition: background 0.2s, color 0.2s;
    }

    a { color: var(--fg); text-decoration-color: var(--ul); }
    a:hover { color: var(--mid); }

    #root { min-height: 100dvh; }

    /* Article body styles */
    .ab h2 { font-size: 14px; font-weight: 700; margin: 2em 0 0.4em; overflow-wrap: anywhere; }
    .ab h3 { font-size: 14px; font-weight: 600; margin: 1.4em 0 0.3em; overflow-wrap: anywhere; }
    .ab p  { margin-bottom: 0.9em; color: var(--mid); overflow-wrap: anywhere; }
    .ab strong { font-weight: 700; color: var(--fg); }
    .ab em { font-style: italic; }
    .ab a { overflow-wrap: anywhere; word-break: break-word; }
    .ab ul, .ab ol { margin: 0 0 0.9em 1.2em; color: var(--mid); overflow-wrap: anywhere; }
    .ab li { margin-bottom: 0.2em; }
    .ab img { display: block; max-width: 100%; height: auto; }
    .ab pre {
      max-width: 100%;
      min-width: 0;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      padding: 12px 0;
      margin-bottom: 0.9em;
    }
    .ab pre code {
      display: block;
      min-width: max-content;
      color: var(--fg);
    }
    .ab code {
      font-family: 'DM Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.92em;
      overflow-wrap: anywhere;
    }
    .ab table {
      display: block;
      max-width: 100%;
      min-width: 0;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      border-collapse: collapse;
      margin: 0 0 0.9em;
    }
    .ab th, .ab td {
      padding: 0.35em 0.6em;
      white-space: nowrap;
      vertical-align: top;
    }

    .app-row, .nav-link {
      padding: 4px 8px;
      margin: 0 -8px;
      border-radius: 5px;
      transition: background 0.18s ease;
      overflow-wrap: anywhere;
    }
    .nav-link {
      display: block;
      width: 100%;
      max-width: 100%;
      text-decoration: none;
      color: inherit;
    }
    .nav-link-fit {
      width: fit-content;
      max-width: 100%;
    }
    .nav-link .nav-link-title { text-decoration: underline; text-decoration-color: var(--ul); overflow-wrap: anywhere; }
    .nav-link:hover { background: rgba(0,0,0,0.05); }
    .app-row.is-hover { background: rgba(0,0,0,0.05); }
    .app-row.is-flash { background: rgba(255, 200, 0, 0.18); }
    :root[data-theme="dark"] .app-row.is-hover,
    :root[data-theme="dark"] .nav-link:hover { background: rgba(255,255,255,0.06); }
    :root[data-theme="dark"] .app-row.is-flash { background: rgba(255, 220, 80, 0.16); }
    :root[data-theme="dark"] .site-icons > a,
    :root[data-theme="dark"] .site-icons > button {
      border: none !important;
    }
    @media (prefers-color-scheme: dark) {
      :root[data-theme="system"] .app-row.is-hover,
      :root[data-theme="system"] .nav-link:hover { background: rgba(255,255,255,0.06); }
      :root[data-theme="system"] .app-row.is-flash { background: rgba(255, 220, 80, 0.16); }
      :root[data-theme="system"] .site-icons > a,
      :root[data-theme="system"] .site-icons > button {
        border: none !important;
      }
    }

    .toc-link {
      display: block;
      font-size: 13px;
      color: var(--mid);
      text-decoration: none;
      padding: 4px 8px;
      margin: 0 -8px;
      border-radius: 5px;
      transition: color 0.1s, background 0.1s;
    }
    .toc-link:hover { color: var(--fg); background: rgba(0,0,0,0.05); }
    .toc-link.on { color: var(--fg); }
    :root[data-theme="dark"] .toc-link:hover { background: rgba(255,255,255,0.08); }
    @media (prefers-color-scheme: dark) {
      :root[data-theme="system"] .toc-link:hover { background: rgba(255,255,255,0.08); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: none; }
    }

    /* OS X Tiger Aqua segmented control — translucent gel pill ("Tide pod") */
    .aqua {
      display: inline-flex;
      background:
        /* top gloss highlight */
        linear-gradient(
          to bottom,
          rgba(255,255,255,0.85) 0%,
          rgba(255,255,255,0.35) 45%,
          rgba(255,255,255,0.05) 50%,
          rgba(255,255,255,0.18) 100%
        ),
        /* base translucent fill */
        rgba(220, 230, 240, 0.55);
      backdrop-filter: blur(4px) saturate(140%);
      -webkit-backdrop-filter: blur(4px) saturate(140%);
      border: 1px solid rgba(60, 80, 110, 0.45);
      border-radius: 999px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.95),
        inset 0 -1px 1px rgba(255,255,255,0.4),
        0 1px 1px rgba(0,0,0,0.12),
        0 0 0 0.5px rgba(255,255,255,0.4);
      overflow: hidden;
      position: relative;
      height: 26px;
    }
    /* Bright top sheen — the "capsule" gloss */
    .aqua::before {
      content: '';
      position: absolute;
      inset: 1px 1px auto 1px;
      height: 50%;
      border-radius: 999px 999px 50% 50% / 999px 999px 100% 100%;
      background: linear-gradient(to bottom, rgba(255,255,255,0.85) 0%, rgba(255,255,255,0.15) 100%);
      pointer-events: none;
      z-index: 1;
    }

    .aqua-btn {
      background: transparent;
      border: none;
      color: #1a3a5c;
      cursor: pointer;
      padding: 0 14px;
      font: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 2;
      transition: background 0.08s ease;
      height: 100%;
      text-shadow: 0 1px 0 rgba(255,255,255,0.55);
    }
    .aqua-btn:not(:first-child) {
      border-left: 1px solid rgba(60, 80, 110, 0.45);
      box-shadow: inset 1px 0 0 rgba(255,255,255,0.55);
    }
    .aqua-btn:hover:not(.aqua-btn-active) {
      background: rgba(255,255,255,0.25);
    }
    .aqua-btn-active {
      background:
        linear-gradient(
          to bottom,
          rgba(180, 215, 245, 0.85) 0%,
          rgba(110, 165, 220, 0.85) 45%,
          rgba(70, 130, 200, 0.92) 55%,
          rgba(55, 115, 190, 0.95) 100%
        );
      color: #fff;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.7),
        inset 0 -1px 1px rgba(0,0,0,0.18),
        inset 1px 0 0 rgba(0,0,0,0.12),
        inset -1px 0 0 rgba(0,0,0,0.12);
      text-shadow: 0 -1px 0 rgba(0,30,80,0.45);
    }

  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="/app.js"></script>
</body>
</html>
